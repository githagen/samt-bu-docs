name: GitHub Pages – omdirigeringsside

# Deployer en enkel omdirigeringsside til GitHub Pages som sender
# alle besøkende fra det gamle nettstedet (samt-x.github.io/samt-bu-docs/)
# til det nye (samt-bu-docs.pages.dev/) – med stipreservering.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "gh-pages-redirect"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Bygg omdirigeringsside
        run: |
          mkdir -p ./redirect-site
          python3 - <<'PYEOF'
          html = """<!DOCTYPE html>
          <html lang="nb">
          <head>
            <meta charset="utf-8">
            <title>SAMT-BU Docs – siden er flyttet</title>
            <script>
              var _redirectTarget = (function () {
                var prefix = '/samt-bu-docs';
                var path = window.location.pathname;
                if (path.startsWith(prefix)) { path = path.slice(prefix.length) || '/'; }
                return 'https://samt-bu-docs.pages.dev' + path
                  + window.location.search + window.location.hash;
              })();
            </script>
            <style>
              body { font-family: sans-serif; max-width: 520px; margin: 80px auto; padding: 0 1rem; color: #222; }
              a { color: #005b99; }
            </style>
          </head>
          <body>
            <h2>Siden er flyttet</h2>
            <p>
              SAMT-BU Docs har fått ny adresse:<br>
              <strong><a id="link" href="https://samt-bu-docs.pages.dev/">https://samt-bu-docs.pages.dev/</a></strong>
            </p>
            <p>Du videresendes automatisk om 4 sekunder.</p>
            <script>
              document.getElementById('link').href = _redirectTarget;
              setTimeout(function () { window.location.replace(_redirectTarget); }, 4000);
            </script>
          </body>
          </html>"""
          with open('./redirect-site/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          import shutil
          shutil.copy('./redirect-site/index.html', './redirect-site/404.html')
          print('Redirect-sider opprettet: index.html + 404.html')
          PYEOF

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Last opp til Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./redirect-site

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
